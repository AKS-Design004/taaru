version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: taaru-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: taaru
      POSTGRES_USER: taaru
      POSTGRES_PASSWORD: taaru_dev_2026
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: taaru-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  typesense:
    image: typesense/typesense:26.0
    container_name: taaru-typesense
    restart: unless-stopped
    environment:
      TYPESENSE_API_KEY: taaru_typesense_dev_key
      TYPESENSE_DATA_DIR: /data
    ports:
      - "8108:8108"
    volumes:
      - typesense_data:/data

volumes:
  postgres_data:
  redis_data:
  typesense_data:
