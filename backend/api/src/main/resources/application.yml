server:
  port: ${PORT:8080}

spring:
  application:
    name: taaru-api

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/taaru}
    username: ${DATABASE_USERNAME:taaru}
    password: ${DATABASE_PASSWORD:taaru_dev_2026}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd'T'HH:mm:ss'Z'

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

taaru:
  jwt:
    secret: ${JWT_SECRET:taaru-dev-jwt-secret-key-change-in-production-minimum-256-bits}
    access-token-expiration: 900000
    refresh-token-expiration: 604800000

  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000}

logging:
  level:
    com.taaru: DEBUG
    org.springframework.security: INFO
