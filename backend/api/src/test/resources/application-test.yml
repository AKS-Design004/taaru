spring:
  datasource:
    url: jdbc:h2:mem:taaru;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  flyway:
    enabled: false

taaru:
  jwt:
    secret: taaru-test-secret-key-that-is-at-least-256-bits-long-for-hmac-sha
    access-token-expiration: 900000
    refresh-token-expiration: 604800000

  cors:
    allowed-origins: http://localhost:3000
