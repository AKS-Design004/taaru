version: "3.8"

volumes:
  postgres_data:
  redis_data:
  typesense_data:

networks:
  taaru:
    driver: bridge

services:
  postgres:
    image: postgres:16-alpine
    container_name: taaru-db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: taaru
      POSTGRES_USER: taaru
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    networks:
      - taaru
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taaru"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: taaru-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - taaru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  typesense:
    image: typesense/typesense:26.0
    container_name: taaru-typesense
    restart: unless-stopped
    volumes:
      - typesense_data:/data
    environment:
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY}
      TYPESENSE_DATA_DIR: /data
    networks:
      - taaru

  api:
    image: ${DOCKER_USERNAME}/taaru-api:latest
    container_name: taaru-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: 8080
      DATABASE_URL: jdbc:postgresql://postgres:5432/taaru
      DATABASE_USERNAME: taaru
      DATABASE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: https://taaru.sn
      SPRING_PROFILES_ACTIVE: prod
    networks:
      - taaru
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    image: ${DOCKER_USERNAME}/taaru-web:latest
    container_name: taaru-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      API_URL: http://api:8080
      PORT: 3000
    networks:
      - taaru

  nginx:
    image: nginx:alpine
    container_name: taaru-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/taaru.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/letsencrypt:ro
      - ./nginx/ssl-data:/var/www/certbot:ro
    depends_on:
      - web
      - api
    networks:
      - taaru

  certbot:
    image: certbot/certbot
    container_name: taaru-certbot
    volumes:
      - ./nginx/ssl:/etc/letsencrypt
      - ./nginx/ssl-data:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
